get:
    summary: Get users

    responses:
        "200":
            description: Success
            content:
                application/json:
                    schema:
                        type: array
                        items:
                            $ref: "../schemas/user.yaml"

        "500":
            description: Error
            content:
                application/json:
                    schema:
                        $ref: "../schemas/error.yaml"
